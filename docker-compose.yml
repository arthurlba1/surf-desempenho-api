services:
  mongo:
    image: mongo:6
    container_name: surf-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: surfadmin
      MONGO_INITDB_ROOT_PASSWORD: surfadmin
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    driver: local
